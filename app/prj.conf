# Logging
CONFIG_LOG=y

# Button and LED support
CONFIG_DK_LIBRARY=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# Memory
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Modem library
CONFIG_NRF_MODEM_LIB=y

# LTE link control
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT=y

# MQTT
CONFIG_MQTT_HELPER=y
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_MQTT_LIB_TLS=y

# TLS related configs (as in Nordic Academy L4E2)
CONFIG_MBEDTLS=y
CONFIG_TLS_CREDENTIALS=y

# Security tag for certificate
CONFIG_MQTT_HELPER_SEC_TAG=24

# Enable modem key management
CONFIG_MODEM_KEY_MGMT=y

# Enable Date Time for TLS certificate validation
CONFIG_DATE_TIME=y