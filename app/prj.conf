# Logging
CONFIG_LOG=y

# Button and LED support
CONFIG_DK_LIBRARY=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

CONFIG_DNS_RESOLVER=y

# Memory
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Modem
CONFIG_NRF_MODEM_LIB=y

# LTE
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT=y

# MQTT
CONFIG_MQTT_HELPER=y
# CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_MQTT_LIB_TLS=y

# TLS
CONFIG_MBEDTLS=y
CONFIG_TLS_CREDENTIALS=y

# Modem Key Management
CONFIG_MODEM_KEY_MGMT=y

# Date / Time (needed for TLS cert validation)
CONFIG_DATE_TIME=y

# --- Essential GNSS/LTE Setup ---
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT_GPS=y
# CONFIG_MODEM_ANTENNA=y
# CONFIG_MODEM_ANTENNA_GNSS_ONBOARD=y

# Enable Float Printing
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_FPU=y

# JSON (for payloads)
CONFIG_CJSON_LIB=y

# JSON parsing (bump dedupe parsing)
CONFIG_CJSON_LIB=y

# PSM request (power saving mode)
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_LC_PSM_MODULE=y

# Persistent storage (Zephyr Settings -> NVS backend)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y